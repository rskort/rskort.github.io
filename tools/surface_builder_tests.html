<!doctype html>
<meta charset="utf-8">
<title>Surface builder browser tests</title>
<link rel="stylesheet" href="../surface-atlas/assets/css/main.css">
<body data-result="pending"><pre id="results">Waiting for browser tests…</pre>
<div data-surface-builder style="max-width:900px;margin:2rem auto">
  <form><label><input type="radio" name="lattice" value="fcc" checked>FCC</label><label><input type="radio" name="lattice" value="bcc">BCC</label><label><input type="radio" name="lattice" value="hcp">HCP</label><label><input type="radio" name="lattice" value="sc">SC</label><label><input type="radio" name="lattice" value="sh">SH</label><label><input type="radio" name="lattice" value="bct">BCT</label><input name="h" value="1"><input name="k" value="1"><span data-hcp-index hidden><input name="i" readonly></span><input name="l" value="1"><input name="a" value="3.61"><span data-c-parameter hidden><input name="c" value="3.61"></span><input name="offset" type="range" min="0" max="1" step=".002" value=".5"><output data-offset-value></output><p data-builder-error hidden></p></form>
  <span data-normalised-plane></span><span data-spacing></span><span data-cell></span><span data-atom-count></span><span data-layer-count></span><a data-catalogue-link hidden></a>
  <div style="height:260px"><canvas data-bulk-cut-canvas style="width:100%;height:100%"></canvas></div>
  <div class="surface-viewer"><div class="viewer-stage" style="height:400px"><canvas></canvas><div class="viewer-loading">Loading</div><div class="viewer-tooltip" hidden></div></div><div><button data-view="reset">Perspective</button><button data-view="top">Top</button><button data-view="side">Side</button><input type="checkbox" data-toggle="sites" checked><input type="checkbox" data-toggle="ontop" checked><input type="checkbox" data-toggle="bridge" checked><input type="checkbox" data-toggle="hollow" checked><input type="checkbox" data-toggle="bonds" checked><input type="checkbox" data-toggle="cell" checked><input type="checkbox" data-toggle="deep" checked></div><p class="viewer-status"></p></div>
  <p data-candidate-site-summary></p><ol data-candidate-site-list></ol>
</div></body>
<script src="../surface-atlas/assets/js/site.js"></script>
<script src="../surface-atlas/assets/js/surface-builder.js"></script>
<script>
  (() => {
    const output = document.querySelector("#results");
    const messages = [];
    const assert = (condition, message) => {
      if (!condition) throw new Error(message);
      messages.push(`PASS: ${message}`);
    };
    const build = (lattice, indices, offset = .5, parameters = {}) => CrystalSurfaceBuilder.createSurfaceGeometry({lattice, indices, offset, ...parameters});
    try {
      assert(CrystalSurfaceBuilder.normaliseIndices([2, 2, 2]).join() === "1,1,1", "common factors reduce");
      assert((() => { try { CrystalSurfaceBuilder.validateEditableIndices([0, 0, 0]); return false; } catch { return true; } })(), "all-zero indices are rejected");
      assert((() => { try { CrystalSurfaceBuilder.validateEditableIndices([9, 0, 0]); return false; } catch { return true; } })(), "indices outside ±8 are rejected");
      const fcc100 = build("fcc", [1, 0, 0]);
      const fcc111 = build("fcc", [1, 1, 1]);
      const bcc110 = build("bcc", [1, 1, 0]);
      const hcp0001 = build("hcp", [0, 0, 1]);
      const hcp1011 = build("hcp", [1, 0, 1]);
      const sc100 = build("sc", [1, 0, 0]);
      const sh0001 = build("sh", [0, 0, 1]);
      const bct001 = build("bct", [0, 0, 1], .5, {a: 3.25, c: 4.95});
      const bctStretched = build("bct", [0, 0, 1], .5, {a: 3.25, c: 6.5});
      const negative = build("fcc", [1, -1, 0]);
      const extremeFcc = build("fcc", [8, -7, 6]);
      const extremeBcc = build("bcc", [8, 7, 1]);
      const extremeHcp = build("hcp", [8, -7, 6]);
      [fcc100, fcc111, bcc110, hcp0001, hcp1011, sc100, sh0001, bct001, negative, extremeFcc, extremeBcc, extremeHcp].forEach((result, index) => {
        assert(result.payload.atoms.length > 0 && result.payload.bonds.length > 0, `representative geometry ${index + 1} has atoms and bonds`);
        assert(result.payload.cell.length === 4, `representative geometry ${index + 1} has a surface cell`);
      });
      assert(fcc100.payload.sites.some(site => site.kind === "hollow" && site.coordination === 4), "FCC(100) finds a fourfold hollow candidate");
      assert(fcc111.payload.sites.some(site => site.kind === "hollow" && site.coordination === 3), "FCC(111) finds a threefold hollow candidate");
      assert(fcc111.payload.sites.every(site => site.heightAboveSupport > 0 && site.clearance + 1e-7 >= site.estimatedBondLength), "candidate heights clear every nearby substrate atom");
      assert(fcc111.payload.sites.every(site => site.coordinate && site.supportLayers && site.definition && site.formula), "candidates include detailed placement metadata");
      assert(fcc111.payload.sites.every(site => site.fractional.every(value => value >= 0 && value < 1)), "candidate coordinates are wrapped into the reference surface cell");
      assert(new Set(fcc111.payload.sites.map(site => `${site.kind}:${site.fractional.map(value => value.toFixed(5)).join()}`)).size === fcc111.payload.sites.length, "periodic candidate copies are deduplicated");
      assert(fcc111.payload.sites.filter(site => site.kind === "ontop").every(site => site.supportLayers === "L1"), "buried close-packed atoms are not mislabeled as ontop sites");
      assert(extremeFcc.metrics.layerCount > fcc111.metrics.layerCount && extremeFcc.metrics.layerCount >= 12, "high-index FCC cuts receive a deeper adaptive slab");
      assert(extremeFcc.payload.sites.length <= 18, "dense high-index candidate sets stay readable");
      assert(extremeBcc.metrics.layerCount > bcc110.metrics.layerCount && extremeBcc.metrics.layerCount <= 24, "adaptive layer depth remains bounded for high-index BCC cuts");
      assert(extremeHcp.metrics.layerCount > hcp0001.metrics.layerCount, "high-index hexagonal cuts receive more closely spaced atomic layers");
      assert(hcp0001.metrics.normal[0] < 1e-8 && hcp0001.metrics.normal[1] < 1e-8, "HCP(0001) normal follows c");
      assert(Math.abs(bct001.metrics.spacing - 4.95) < 1e-8, "BCT(001) spacing uses c");
      assert(bctStretched.metrics.spacing > bct001.metrics.spacing, "changing BCT c changes its surface metric");
      assert(CrystalSurfaceBuilder.catalogueMatch("fcc", [0, 1, 1]) === "fcc-110", "cubic symmetry matches the catalogue");
      assert(CrystalSurfaceBuilder.catalogueMatch("hcp", [1, 0, 1]) === "hcp-10m11", "HCP plane matches the catalogue");
      assert(CrystalSurfaceBuilder.catalogueMatch("sc", [0, 1, 2]) === "sc-210", "SC cubic symmetry matches the catalogue");
      assert(CrystalSurfaceBuilder.catalogueMatch("sh", [1, 0, 1]) === "sh-10m11", "SH plane matches the catalogue");
      assert(CrystalSurfaceBuilder.catalogueMatch("bct", [1, 0, 1]) === "bct-101", "BCT preserves the distinct c index");
      const before = build("fcc", [1, 0, 0], .49).payload.atoms.filter(atom => atom.layer === 0).map(atom => atom.z).join();
      const after = build("fcc", [1, 0, 0], .51).payload.atoms.filter(atom => atom.layer === 0).map(atom => atom.z).join();
      assert(before !== after, "crossing an atomic layer changes the termination");
      assert(document.querySelector(".viewer-status").textContent.includes("atoms"), "builder UI renders generated geometry");
      assert(document.querySelector(".viewer-status").textContent.includes("atomic layers"), "builder UI reports adaptive slab layers");
      assert(Number.parseInt(document.querySelector("[data-layer-count]").textContent, 10) >= 6, "builder summary reports the layer count");
      assert(document.querySelectorAll("[data-candidate-site-list] li").length > 0, "builder renders detailed candidate-site cards");
      assert(document.querySelector("[data-candidate-site-list]").textContent.includes("Estimated height"), "candidate cards explain automatic placement height");
      assert(document.querySelector("[data-normalised-plane]").textContent === "FCC(1 1 1)", "builder UI displays the reduced plane");
      assert(document.querySelector("[data-hcp-index]").hidden, "HCP-only index starts hidden for cubic lattices");
      assert(location.search.includes("lattice=fcc") && location.search.includes("a=3.6100") && location.search.includes("offset=0.500"), "builder UI stores state in the URL");
      history.pushState(null, "", "?lattice=hcp&h=1&k=0&l=1&offset=0.700");
      dispatchEvent(new PopStateEvent("popstate"));
      assert(document.querySelector("[data-normalised-plane]").textContent === "HCP(1 0 -1 1)", "popstate restores HCP Miller–Bravais state");
      assert(document.querySelector('[name="i"]').value === "-1", "HCP i index is derived automatically");
      assert(!document.querySelector("[data-hcp-index]").hidden, "HCP-only index appears for HCP");
      assert(document.querySelector("[data-offset-value]").textContent === "0.70", "query state restores the plane offset");
      document.body.dataset.result = "passed";
      output.textContent = messages.join("\n");
    } catch (error) {
      document.body.dataset.result = "failed";
      output.textContent = `${messages.join("\n")}\nFAIL: ${error.stack || error.message}`;
    }
  })();
</script>
