- id: fcc-100
  crystal: fcc
  title: FCC(100)
  group: low-index
  family: Low-index FCC
  lattice: Face-centred cubic
  facet: "(100)"
  surface_shape: Square net
  character: Flat · fourfold symmetry
  ase_builder: fcc100
  description: The (100) cut exposes a square array of equivalent atoms. Its open centre is the characteristic fourfold hollow, while the layer below sits underneath each bridge direction.
  cut_description: The (100) family is perpendicular to one cube axis and parallel to the other two. Sliding that plane through the FCC cell repeatedly exposes equivalent square layers.
  card_description: A square surface net with a distinctive fourfold hollow.
  registry_note: Successive square layers alternate laterally between A and B positions. A second-layer atom sits below each fourfold hollow, adding subsurface coordination that a top-layer-only picture would miss.
  math_summary: 'The nearest-neighbour surface spacing is \(a/\sqrt{2}\). A convenient primitive cell has two perpendicular vectors of that length.'
  sites:
    - {label: ontop, marker: 1, coordination: 1, definition: Directly above one outermost atom., ase_keyword: ontop}
    - {label: bridge, marker: 2, coordination: 2, definition: Halfway between adjacent surface atoms., ase_keyword: bridge}
    - {label: hollow, marker: 3, coordination: 4, definition: At the centre of a square of four surface atoms., ase_keyword: hollow}
  ase_example: |
    from ase.build import add_adsorbate, fcc100

    slab = fcc100("Cu", size=(3, 3, 4), a=3.61, vacuum=10)
    add_adsorbate(slab, "H", 1.5, position="hollow")
  common_mistakes:
    - Calling the central hollow threefold; four top-layer atoms surround it.
    - Confusing the cubic lattice constant with the shorter surface nearest-neighbour spacing.
  figures: {top: /assets/surfaces/fcc-100-top.svg, profile: /assets/surfaces/fcc-100-profile.svg, stacking: /assets/surfaces/fcc-100-stacking.svg}

- id: fcc-110
  crystal: fcc
  title: FCC(110)
  group: low-index
  family: Low-index FCC
  lattice: Face-centred cubic
  facet: "(110)"
  surface_shape: Rectangular rows
  character: Flat · strongly anisotropic
  ase_builder: fcc110
  description: The (110) cut is the most open low-index FCC face. Close-packed atomic rows run in one direction, separated by troughs that make the two in-plane axes visibly inequivalent.
  cut_description: The plane meets two cubic axes equally and remains parallel to the third. Its diagonal passage through the cube produces dense rows separated by open channels.
  card_description: Dense atomic rows separated by open, directional troughs.
  registry_note: The side profile reveals ridges and troughs even though the macroscopic plane is flat. Atoms below the trough change the coordination of sites that appear empty from above.
  math_summary: 'A rectangular cell uses lengths \(a/\sqrt{2}\) along the close-packed rows and \(a\) across them.'
  sites:
    - {label: ontop, marker: 1, coordination: 1, definition: Directly above an atom on a close-packed row., ase_keyword: ontop}
    - {label: short bridge, marker: 2, coordination: 2, definition: Between nearest neighbours along a row., ase_keyword: shortbridge}
    - {label: long bridge, marker: 3, coordination: 2, definition: Between atoms across neighbouring rows., ase_keyword: longbridge}
    - {label: trough hollow, marker: 4, coordination: 4, definition: In the channel between the raised rows., ase_keyword: hollow}
  ase_example: |
    from ase.build import add_adsorbate, fcc110

    slab = fcc110("Cu", size=(3, 3, 4), a=3.61, vacuum=10)
    add_adsorbate(slab, "H", 1.2, position="hollow")
  common_mistakes:
    - Using “bridge” without specifying whether it runs along or across a row.
    - Treating the rectangular net as isotropic.
  figures: {top: /assets/surfaces/fcc-110-top.svg, profile: /assets/surfaces/fcc-110-profile.svg, stacking: /assets/surfaces/fcc-110-stacking.svg}

- id: fcc-111
  crystal: fcc
  title: FCC(111)
  group: low-index
  family: Low-index FCC
  lattice: Face-centred cubic
  facet: "(111)"
  surface_shape: Triangular net
  character: Flat · close packed
  ase_builder: fcc111
  description: The (111) plane is the close-packed FCC face. Every surface atom has six neighbours in a triangular net, and two visually similar threefold hollows are distinguished by the stacking below.
  cut_description: The plane meets x, y, and z at equal intercepts. It slices across the cube corner-to-corner and selects one close-packed layer from the ABC sequence.
  card_description: The close-packed triangular net with FCC and HCP hollows.
  registry_note: FCC layers follow an ABC sequence. An HCP hollow lies above a second-layer atom; an FCC hollow lies above a third-layer atom and continues the ABC sequence.
  math_summary: 'The two primitive vectors both have length \(a/\sqrt{2}\) and meet at \(60^\circ\). The interlayer spacing is \(a/\sqrt{3}\).'
  sites:
    - {label: ontop, marker: 1, coordination: 1, definition: Directly above one atom in the triangular net., ase_keyword: ontop}
    - {label: bridge, marker: 2, coordination: 2, definition: Halfway along a nearest-neighbour bond., ase_keyword: bridge}
    - {label: FCC hollow, marker: 3, coordination: 3, definition: Threefold opening above a third-layer atom., ase_keyword: fcc}
    - {label: HCP hollow, marker: 4, coordination: 3, definition: Threefold opening above a second-layer atom., ase_keyword: hcp}
  ase_example: |
    from ase.build import add_adsorbate, fcc111

    slab = fcc111("Cu", size=(3, 3, 4), a=3.61, vacuum=10)
    add_adsorbate(slab, "H", 1.2, position="fcc")
  common_mistakes:
    - Calling the triangular atomic net a honeycomb lattice.
    - Identifying FCC and HCP hollows without looking below the top layer.
  figures: {top: /assets/surfaces/fcc-111-top.svg, profile: /assets/surfaces/fcc-111-profile.svg, stacking: /assets/surfaces/fcc-111-stacking.svg}

- id: fcc-210
  crystal: fcc
  title: FCC(210)
  group: high-index
  family: Open FCC
  lattice: Face-centred cubic
  facet: "(210)"
  surface_shape: Narrow terraces
  character: Stepped · very open
  ase_builder: surface
  description: Tilting away from (100) towards (110) produces the open (210) surface. Its short terraces repeat rapidly, creating pronounced ledges and low-coordinate ridge atoms.
  cut_description: Relative to (100), the [210] normal is tilted towards [110]. The resulting atomic cut resolves into a rapidly repeating staircase of short terraces.
  card_description: A strongly tilted (100)-like surface with closely spaced ledges.
  registry_note: 'The profile makes the terrace-and-step interpretation explicit: the surface normal averages over a staircase of atomic ledges rather than passing through a single flat layer.'
  math_summary: 'The normal is \([210]\). Its angle from [100] is \(\cos^{-1}(2/\sqrt{5})\approx26.6^\circ\), so the terrace period is short.'
  sites:
    - {label: ridge ontop, marker: 1, coordination: 1, definition: Above a low-coordinate atom at the upper ledge.}
    - {label: step bridge, marker: 2, coordination: 2, definition: Between neighbouring atoms along the ledge.}
    - {label: trough, marker: 3, coordination: 4, definition: In the open channel below the ridge.}
  ase_example: |
    from ase.build import bulk, surface

    cu = bulk("Cu", "fcc", a=3.61, cubic=True)
    slab = surface(cu, (2, 1, 0), layers=8, vacuum=10)
  common_mistakes:
    - Treating all visible rows as equally high; the side profile shows their step sequence.
    - Assigning a low-index ASE site keyword to a high-index surface without checking coordinates.
  figures: {top: /assets/surfaces/fcc-210-top.svg, profile: /assets/surfaces/fcc-210-profile.svg, stacking: /assets/surfaces/fcc-210-stacking.svg}

- id: fcc-211
  crystal: fcc
  title: FCC(211)
  group: high-index
  family: Stepped FCC
  lattice: Face-centred cubic
  facet: "(211)"
  surface_shape: (111) terraces
  character: Stepped · kink-free
  ase_builder: surface
  description: FCC(211) is commonly read as narrow (111)-like terraces separated by monatomic (100)-type steps. Terrace and step atoms therefore offer clearly different local coordination.
  cut_description: The [211] normal tilts the cut away from (111). At atomic scale the plane becomes three-row (111)-like terraces separated by single-height steps.
  card_description: Narrow close-packed terraces separated by straight monatomic steps.
  registry_note: Rows at the upper ledge have fewer substrate neighbours than atoms inside a terrace. This under-coordination often makes the step edge more reactive than the terrace.
  math_summary: 'The normal \([211]\) gives a regular staircase with straight step edges. The repeat cell contains both terrace and ledge environments.'
  sites:
    - {label: terrace hollow, marker: 1, coordination: 3, definition: A threefold position within the narrow close-packed terrace.}
    - {label: step bridge, marker: 2, coordination: 2, definition: Between adjacent atoms along the upper ledge.}
    - {label: step hollow, marker: 3, coordination: 3, definition: At the base of the step with neighbours at two heights.}
  ase_example: |
    from ase.build import bulk, surface

    cu = bulk("Cu", "fcc", a=3.61, cubic=True)
    slab = surface(cu, (2, 1, 1), layers=8, vacuum=10)
  common_mistakes:
    - Describing the entire facet as a flat (111) plane and omitting the steps.
    - Comparing terrace and ledge sites using only their lateral coordination.
  figures: {top: /assets/surfaces/fcc-211-top.svg, profile: /assets/surfaces/fcc-211-profile.svg, stacking: /assets/surfaces/fcc-211-stacking.svg}

- id: fcc-221
  crystal: fcc
  title: FCC(221)
  group: high-index
  family: Stepped FCC
  lattice: Face-centred cubic
  facet: "(221)"
  surface_shape: Close-packed ledges
  character: Stepped · narrow terraces
  ase_builder: surface
  description: The (221) orientation lies near (111) but resolves into closely spaced ledges. The short repeat makes subsurface registry especially important when naming hollows.
  cut_description: Equal h and k keep a mirror direction in the plane, while the smaller l component tilts the cut away from (111) and introduces closely spaced ledges.
  card_description: A compact stepped net close in orientation to the (111) face.
  registry_note: Several apparent openings overlap atoms in lower layers. Reading the pale registry together with the profile prevents an empty-looking top view from being mistaken for a simple hollow.
  math_summary: 'The normal is \([221]\). Equal h and k indices preserve a mirror symmetry along the step direction.'
  sites:
    - {label: ledge ontop, marker: 1, coordination: 1, definition: Above an atom at the top of a closely spaced ledge.}
    - {label: ledge bridge, marker: 2, coordination: 2, definition: Between neighbours running along the step.}
    - {label: lower hollow, marker: 3, coordination: 3, definition: In the pocket immediately below the ledge.}
  ase_example: |
    from ase.build import bulk, surface

    cu = bulk("Cu", "fcc", a=3.61, cubic=True)
    slab = surface(cu, (2, 2, 1), layers=8, vacuum=10)
  common_mistakes:
    - Assuming every triangular opening has the same subsurface registry.
    - Ignoring that the two sides of a step can expose different local environments.
  figures: {top: /assets/surfaces/fcc-221-top.svg, profile: /assets/surfaces/fcc-221-profile.svg, stacking: /assets/surfaces/fcc-221-stacking.svg}

- id: fcc-310
  crystal: fcc
  title: FCC(310)
  group: high-index
  family: Open FCC
  lattice: Face-centred cubic
  facet: "(310)"
  surface_shape: Wide channels
  character: Stepped · anisotropic
  ase_builder: surface
  description: FCC(310) is a gentler tilt from (100) than (210), so its (100)-like terraces are wider. Straight rows bound elongated channels across the surface.
  cut_description: The [310] normal is closer to [100] than [210] is. That smaller miscut produces wider (100)-like terraces before the next ledge.
  card_description: Wider (100)-like terraces with long, directional channels.
  registry_note: Comparing (210) and (310) shows how increasing the first index widens the terrace while retaining the same broad step direction.
  math_summary: 'The angle between [310] and [100] is \(\cos^{-1}(3/\sqrt{10})\approx18.4^\circ\), smaller than for (210).'
  sites:
    - {label: terrace ontop, marker: 1, coordination: 1, definition: Above an atom away from the ledge.}
    - {label: row bridge, marker: 2, coordination: 2, definition: Between atoms along a dense row.}
    - {label: channel hollow, marker: 3, coordination: 4, definition: In the elongated opening between rows.}
  ase_example: |
    from ase.build import bulk, surface

    cu = bulk("Cu", "fcc", a=3.61, cubic=True)
    slab = surface(cu, (3, 1, 0), layers=8, vacuum=10)
  common_mistakes:
    - Interchanging the long and short in-plane directions.
    - Using a square supercell notation for a fundamentally rectangular repeat.
  figures: {top: /assets/surfaces/fcc-310-top.svg, profile: /assets/surfaces/fcc-310-profile.svg, stacking: /assets/surfaces/fcc-310-stacking.svg}

- id: fcc-311
  crystal: fcc
  title: FCC(311)
  group: high-index
  family: Stepped FCC
  lattice: Face-centred cubic
  facet: "(311)"
  surface_shape: (100) terraces
  character: Stepped · compact
  ase_builder: surface
  description: The (311) surface combines short (100)-like terraces with close-packed step edges. Square-like terrace pockets sit next to lower-coordinate ledge atoms.
  cut_description: The [311] cut lies between the (100) and (111) orientations. Its repeated intersection with the FCC lattice creates compact terraces and close-packed step rims.
  card_description: Short square terraces interrupted by close-packed step rows.
  registry_note: The top view mixes square terrace motifs with step pockets. The side profile identifies which apparent neighbours actually lie one atomic level lower.
  math_summary: 'The \([311]\) normal produces a periodic array of compact terraces; its two equal minor indices retain a mirror-related in-plane geometry.'
  sites:
    - {label: terrace hollow, marker: 1, coordination: 4, definition: A square-like pocket on the (100)-type terrace.}
    - {label: step bridge, marker: 2, coordination: 2, definition: Between adjacent upper-step atoms.}
    - {label: ledge hollow, marker: 3, coordination: 3, definition: A mixed-height pocket beside the step.}
  ase_example: |
    from ase.build import bulk, surface

    cu = bulk("Cu", "fcc", a=3.61, cubic=True)
    slab = surface(cu, (3, 1, 1), layers=8, vacuum=10)
  common_mistakes:
    - Calling the mixed-height ledge pocket a flat fourfold hollow.
    - Comparing coverages without accounting for the larger high-index repeat cell.
  figures: {top: /assets/surfaces/fcc-311-top.svg, profile: /assets/surfaces/fcc-311-profile.svg, stacking: /assets/surfaces/fcc-311-stacking.svg}

- id: fcc-331
  crystal: fcc
  title: FCC(331)
  group: high-index
  family: Stepped FCC
  lattice: Face-centred cubic
  facet: "(331)"
  surface_shape: (111)-like terraces
  character: Stepped · close-packed rows
  ase_builder: surface
  description: 'FCC(331) is vicinal to (111): close-packed terrace motifs are interrupted at regular intervals by straight ledges, creating terrace and step hollows in one repeat.'
  cut_description: The [331] normal sits close to [111]. The modest tilt interrupts the close-packed plane every few rows, producing regular straight ledges.
  card_description: A vicinal (111) face with regular straight ledges.
  registry_note: The triangular terrace pattern remains visible, but the ABC stacking is interrupted at each ledge. Hollow labels must therefore be tied to a specific local registry.
  math_summary: 'The \([331]\) normal is about \(22^\circ\) from [111], giving a visibly stepped version of the close-packed face.'
  sites:
    - {label: terrace hollow, marker: 1, coordination: 3, definition: A threefold site within the (111)-like terrace.}
    - {label: ledge bridge, marker: 2, coordination: 2, definition: Between neighbouring atoms at the step rim.}
    - {label: step pocket, marker: 3, coordination: 3, definition: A mixed-layer hollow directly below the rim.}
  ase_example: |
    from ase.build import bulk, surface

    cu = bulk("Cu", "fcc", a=3.61, cubic=True)
    slab = surface(cu, (3, 3, 1), layers=8, vacuum=10)
  common_mistakes:
    - Carrying FCC/HCP labels across a step without rechecking the local stacking.
    - Treating the macroscopic (331) plane as one geometrically flat atomic layer.
  figures: {top: /assets/surfaces/fcc-331-top.svg, profile: /assets/surfaces/fcc-331-profile.svg, stacking: /assets/surfaces/fcc-331-stacking.svg}

- id: fcc-511
  crystal: fcc
  title: FCC(511)
  group: high-index
  family: Stepped FCC
  lattice: Face-centred cubic
  facet: "(511)"
  surface_shape: Wide (100) terraces
  character: Stepped · separated ledges
  ase_builder: surface
  description: Increasing the leading index to five creates wider (100)-like terraces between the ledges. FCC(511) makes the distinction between terrace sites and step sites particularly easy to see.
  cut_description: The [511] normal lies only slightly away from [100]. The bulk cut therefore preserves broad square terraces between comparatively well-separated steps.
  card_description: Broad square terraces separated by regularly spaced ledges.
  registry_note: Compared with (311), more terrace-like atoms fit between consecutive steps. This lets adsorption approach the (100) limit away from the ledge while remaining distinct at the edge.
  math_summary: 'The \([511]\) normal is only \(15.8^\circ\) from [100], so (100)-like terrace behaviour dominates a larger fraction of the cell.'
  sites:
    - {label: terrace hollow, marker: 1, coordination: 4, definition: A fourfold-like site near the middle of the broad terrace.}
    - {label: terrace bridge, marker: 2, coordination: 2, definition: Between two neighbours within the terrace.}
    - {label: step bridge, marker: 3, coordination: 2, definition: Along the low-coordinate ledge row.}
    - {label: step pocket, marker: 4, coordination: 3, definition: At the lower side of the step.}
  ase_example: |
    from ase.build import bulk, surface

    cu = bulk("Cu", "fcc", a=3.61, cubic=True)
    slab = surface(cu, (5, 1, 1), layers=10, vacuum=10)
  common_mistakes:
    - Averaging terrace and step adsorption into one site type.
    - Using too few lateral repeats to separate adsorbates along the ledge.
  figures: {top: /assets/surfaces/fcc-511-top.svg, profile: /assets/surfaces/fcc-511-profile.svg, stacking: /assets/surfaces/fcc-511-stacking.svg}

- id: bcc-100
  crystal: bcc
  title: BCC(100)
  group: low-index
  family: Low-index BCC
  lattice: Body-centred cubic
  facet: "(100)"
  surface_shape: Square net
  character: Flat · alternating layers
  ase_builder: bcc100
  description: BCC(100) exposes a square net, but successive layers alternate between corner and body-centred positions. The subsurface atom therefore changes the meaning of the square opening.
  cut_description: The cut is perpendicular to one cube axis. Unlike FCC, translating it through BCC alternates between corner-atom and body-centred layers.
  card_description: A square net whose registry alternates through the body centre.
  registry_note: The second layer is shifted to the centre of the surface square, giving the hollow substantial subsurface coordination.
  math_summary: 'The square repeat follows the cubic axes and has side length \(a\); adjacent atomic layers are separated by \(a/2\).'
  sites:
    - {label: ontop, marker: 1, coordination: 1, definition: Directly above a surface atom., ase_keyword: ontop}
    - {label: bridge, marker: 2, coordination: 2, definition: Halfway along an edge of the square net., ase_keyword: bridge}
    - {label: hollow, marker: 3, coordination: 4, definition: At the square centre above a subsurface atom., ase_keyword: hollow}
  ase_example: |
    from ase.build import bcc100

    slab = bcc100("Fe", size=(3, 3, 6), a=2.87, vacuum=10)
  common_mistakes:
    - Assuming its square hollow has the same subsurface registry as FCC(100).
    - Forgetting that successive BCC(100) layers are not laterally equivalent.
  figures: {top: /assets/surfaces/bcc-100-top.svg, profile: /assets/surfaces/bcc-100-profile.svg, stacking: /assets/surfaces/bcc-100-stacking.svg}

- id: bcc-110
  crystal: bcc
  title: BCC(110)
  group: low-index
  family: Low-index BCC
  lattice: Body-centred cubic
  facet: "(110)"
  surface_shape: Rectangular net
  character: Flat · close packed for BCC
  ase_builder: bcc110
  description: BCC(110) is the densest BCC face. Zig-zag rows pack more closely than on BCC(100), while the rectangular cell retains two inequivalent bridge directions.
  cut_description: The plane crosses x and y equally and remains parallel to z. It passes through both corner and body-centred sites, producing BCC's most closely packed surface.
  card_description: The densest BCC face, with zig-zag rows and anisotropic bridges.
  registry_note: Atoms in the first two layers interlock to form the dense row pattern; a single-layer view makes the net look more open than it is.
  math_summary: 'A convenient rectangular cell spans \(a\) and \(a/\sqrt{2}\). The two bridge directions are geometrically distinct.'
  sites:
    - {label: ontop, marker: 1, coordination: 1, definition: Above an atom in a dense surface row., ase_keyword: ontop}
    - {label: short bridge, marker: 2, coordination: 2, definition: Between the closest pair along the compact direction., ase_keyword: shortbridge}
    - {label: long bridge, marker: 3, coordination: 2, definition: Between atoms across the rectangular channel., ase_keyword: longbridge}
    - {label: hollow, marker: 4, coordination: 4, definition: In the asymmetric opening between rows., ase_keyword: hollow}
  ase_example: |
    from ase.build import bcc110

    slab = bcc110("Fe", size=(3, 4, 6), a=2.87, vacuum=10)
  common_mistakes:
    - Calling BCC(100), rather than BCC(110), the close-packed BCC face.
    - Treating short and long bridges as equivalent.
  figures: {top: /assets/surfaces/bcc-110-top.svg, profile: /assets/surfaces/bcc-110-profile.svg, stacking: /assets/surfaces/bcc-110-stacking.svg}

- id: bcc-111
  crystal: bcc
  title: BCC(111)
  group: low-index
  family: Low-index BCC
  lattice: Body-centred cubic
  facet: "(111)"
  surface_shape: Triangular rows
  character: Flat · open and corrugated
  ase_builder: bcc111
  description: BCC(111) is an open, strongly layered face. Its apparent triangular symmetry spans several closely spaced heights rather than one close-packed atomic sheet.
  cut_description: Equal intercepts give a plane normal to the cube body diagonal. In BCC this direction runs through the central atom, creating a sequence of corrugated triangular layers.
  card_description: An open threefold surface built from several closely spaced levels.
  registry_note: Three-layer registry is essential here because the topmost plane alone contains comparatively few atoms.
  math_summary: 'The macroscopic threefold symmetry follows [111], while the interplanar repeat is \(a/\sqrt{3}\).'
  sites:
    - {label: ontop, marker: 1, coordination: 1, definition: Above an atom in the outermost triangular row., ase_keyword: ontop}
    - {label: bridge, marker: 2, coordination: 2, definition: Between neighbouring projected rows.}
    - {label: threefold pocket, marker: 3, coordination: 3, definition: In a mixed-height triangular opening.}
  ase_example: |
    from ase.build import bcc111

    slab = bcc111("Fe", size=(3, 4, 9), a=2.87, vacuum=10,
                  orthogonal=True)
  common_mistakes:
    - Treating BCC(111) as the analogue of close-packed FCC(111).
    - Assigning a hollow from top-view symmetry without checking atom heights.
  figures: {top: /assets/surfaces/bcc-111-top.svg, profile: /assets/surfaces/bcc-111-profile.svg, stacking: /assets/surfaces/bcc-111-stacking.svg}

- id: bcc-210
  crystal: bcc
  title: BCC(210)
  group: high-index
  family: Open BCC
  lattice: Body-centred cubic
  facet: "(210)"
  surface_shape: Ridges and troughs
  character: Stepped · very open
  ase_builder: surface
  description: BCC(210) exposes pronounced ridges separated by deep channels. Low-coordinate ridge atoms and mixed-height pockets make it a useful contrast to the flatter (110) face.
  cut_description: Tilting the normal from [100] towards [110] forces the cut through alternating corner and body-centred rows, creating a short-period staircase.
  card_description: A highly open BCC face with sharp ridges and deep channels.
  registry_note: The projected trough contains neighbours from several heights, so lateral coordination alone understates the local environment.
  math_summary: 'The [210] normal is \(26.6^\circ\) from [100], producing closely spaced ledges.'
  sites:
    - {label: ridge ontop, marker: 1, coordination: 1, definition: Above the uppermost low-coordinate row.}
    - {label: ridge bridge, marker: 2, coordination: 2, definition: Between neighbours along the ridge.}
    - {label: trough pocket, marker: 3, coordination: 4, definition: In the mixed-layer channel below the ridge.}
  ase_example: |
    from ase.build import bulk, surface

    fe = bulk("Fe", "bcc", a=2.87, cubic=True)
    slab = surface(fe, (2, 1, 0), 10, vacuum=10)
  common_mistakes:
    - Reading trough atoms as coplanar with the ridge.
    - Reusing FCC high-index site names without recalculating the neighbours.
  figures: {top: /assets/surfaces/bcc-210-top.svg, profile: /assets/surfaces/bcc-210-profile.svg, stacking: /assets/surfaces/bcc-210-stacking.svg}

- id: bcc-211
  crystal: bcc
  title: BCC(211)
  group: high-index
  family: Stepped BCC
  lattice: Body-centred cubic
  facet: "(211)"
  surface_shape: Narrow ledges
  character: Stepped · anisotropic
  ase_builder: surface
  description: BCC(211) combines straight step rows with narrow terraces. The body-centred basis introduces a stagger between neighbouring ledges.
  cut_description: The nonzero l component rotates the [210]-type cut out of its channel direction, generating staggered ledges rather than parallel coplanar ridges.
  card_description: Narrow BCC terraces with staggered, directional ledges.
  registry_note: Adjacent rows alternate their height and lateral offset, which is easiest to see by rotating the 3D model towards a side view.
  math_summary: 'The [211] normal defines an oblique repeat containing both terrace-like and ledge atoms.'
  sites:
    - {label: terrace ontop, marker: 1, coordination: 1, definition: Above an atom between two ledges.}
    - {label: step bridge, marker: 2, coordination: 2, definition: Between atoms along the upper ledge.}
    - {label: step pocket, marker: 3, coordination: 3, definition: In a mixed-height opening beside the ledge.}
  ase_example: |
    from ase.build import bulk, surface

    fe = bulk("Fe", "bcc", a=2.87, cubic=True)
    slab = surface(fe, (2, 1, 1), 10, vacuum=10)
  common_mistakes:
    - Assuming neighbouring step rows have identical registry.
    - Counting projected rather than three-dimensional nearest neighbours.
  figures: {top: /assets/surfaces/bcc-211-top.svg, profile: /assets/surfaces/bcc-211-profile.svg, stacking: /assets/surfaces/bcc-211-stacking.svg}

- id: bcc-310
  crystal: bcc
  title: BCC(310)
  group: high-index
  family: Open BCC
  lattice: Body-centred cubic
  facet: "(310)"
  surface_shape: Wide channels
  character: Stepped · row-like
  ase_builder: surface
  description: BCC(310) is a gentler vicinal cut than BCC(210), with broader terrace regions between its raised rows and correspondingly wider channels.
  cut_description: Moving the normal closer to [100] increases the distance between equivalent ledges. The cut retains BCC's alternating corner/body-centre sequence.
  card_description: Broader BCC terraces separated by straight raised rows.
  registry_note: Comparing (210) and (310) directly shows how a smaller miscut increases terrace width without changing the basic ledge direction.
  math_summary: 'The [310] normal is \(18.4^\circ\) from [100], so the step density is lower than on (210).'
  sites:
    - {label: terrace ontop, marker: 1, coordination: 1, definition: Above an atom in the broader terrace region.}
    - {label: row bridge, marker: 2, coordination: 2, definition: Between neighbours along a raised row.}
    - {label: channel pocket, marker: 3, coordination: 4, definition: In the elongated opening between rows.}
  ase_example: |
    from ase.build import bulk, surface

    fe = bulk("Fe", "bcc", a=2.87, cubic=True)
    slab = surface(fe, (3, 1, 0), 10, vacuum=10)
  common_mistakes:
    - Interchanging the row and cross-row directions.
    - Comparing coverages without accounting for its larger surface cell.
  figures: {top: /assets/surfaces/bcc-310-top.svg, profile: /assets/surfaces/bcc-310-profile.svg, stacking: /assets/surfaces/bcc-310-stacking.svg}

- id: hcp-0001
  crystal: hcp
  title: HCP(0001)
  group: low-index
  family: Basal HCP
  lattice: Hexagonal close packed
  facet: "(0001)"
  surface_shape: Triangular net
  character: Basal · close packed
  ase_builder: hcp0001
  description: HCP(0001) is the close-packed basal face. Its triangular top layer resembles FCC(111), but the stacking repeats AB rather than ABC.
  cut_description: The (0001) plane is perpendicular to the hexagonal c axis and parallel to all basal axes. It selects one close-packed sheet from the ABAB sequence.
  card_description: The close-packed HCP basal plane with ABAB stacking.
  registry_note: HCP and FCC hollows look identical in one layer; the ABAB stacking below distinguishes them from the ABC sequence on FCC(111).
  math_summary: 'The basal primitive vectors have length \(a\) and meet at \(60^\circ\); ideal HCP has \(c/a=\sqrt{8/3}\).'
  sites:
    - {label: ontop, marker: 1, coordination: 1, definition: Directly above one basal-plane atom., ase_keyword: ontop}
    - {label: bridge, marker: 2, coordination: 2, definition: Halfway along a nearest-neighbour bond., ase_keyword: bridge}
    - {label: FCC hollow, marker: 3, coordination: 3, definition: Threefold opening that would continue ABC stacking., ase_keyword: fcc}
    - {label: HCP hollow, marker: 4, coordination: 3, definition: Threefold opening above the second-layer registry., ase_keyword: hcp}
  ase_example: |
    from ase.build import hcp0001

    slab = hcp0001("Mg", size=(3, 3, 6), a=3.21, c=5.21,
                   vacuum=10)
  common_mistakes:
    - Treating HCP(0001) and FCC(111) as identical beyond the top layer.
    - Forgetting to report the c/a ratio used for the slab.
  figures: {top: /assets/surfaces/hcp-0001-top.svg, profile: /assets/surfaces/hcp-0001-profile.svg, stacking: /assets/surfaces/hcp-0001-stacking.svg}

- id: hcp-10m10
  crystal: hcp
  title: HCP(10-10)
  group: low-index
  family: Prismatic HCP
  lattice: Hexagonal close packed
  facet: "(10-10)"
  surface_shape: Rectangular rows
  character: Prism · nonpolar
  ase_builder: hcp10m10
  description: The first-order prism face runs parallel to the c axis. It exposes rectangular atomic rows and makes the difference between basal and axial directions explicit.
  cut_description: The plane is parallel to c and cuts one pair of basal axes. In the bulk prism it appears as a vertical sheet through the hexagonal column.
  card_description: A nonpolar prism face with distinct basal and c-axis rows.
  registry_note: Alternating rows originate from the two-atom HCP basis, so equal-looking gaps can have different atoms immediately underneath.
  math_summary: 'One in-plane vector follows [0001] with period \(c\); the other lies in the basal plane.'
  sites:
    - {label: ontop, marker: 1, coordination: 1, definition: Directly above an outermost prism-row atom., ase_keyword: ontop}
    - {label: row bridge, marker: 2, coordination: 2, definition: Between neighbours along a prism row.}
    - {label: channel, marker: 3, coordination: 4, definition: In the rectangular opening between alternating rows.}
  ase_example: |
    from ase.build import hcp10m10

    slab = hcp10m10("Mg", size=(3, 4, 6), a=3.21, c=5.21,
                    vacuum=10)
  common_mistakes:
    - Dropping the redundant i index without stating the three-index conversion.
    - Treating the basal and c-axis directions as equivalent.
  figures: {top: /assets/surfaces/hcp-10m10-top.svg, profile: /assets/surfaces/hcp-10m10-profile.svg, stacking: /assets/surfaces/hcp-10m10-stacking.svg}

- id: hcp-11m20
  crystal: hcp
  title: HCP(11-20)
  group: low-index
  family: Prismatic HCP
  lattice: Hexagonal close packed
  facet: "(11-20)"
  surface_shape: Rectangular zig-zag rows
  character: Prism · rotated basal cut
  ase_builder: surface
  description: HCP(11-20), the second common prism orientation, is rotated by 30 degrees in the basal plane relative to (10-10). That rotation changes which HCP rows terminate at the surface.
  cut_description: Like (10-10), this plane is parallel to c, but its basal normal is rotated. The hexagonal bulk diagram makes the two inequivalent prism cuts visible.
  card_description: A prism cut rotated 30° from HCP(10-10).
  registry_note: The axial periodicity is unchanged, while the cross-row spacing and exposed two-atom registry differ from the first-order prism.
  math_summary: 'The plane contains [0001] but uses the basal [11-20] orientation for its second in-plane direction.'
  sites:
    - {label: row ontop, marker: 1, coordination: 1, definition: Above an atom on the outer zig-zag row.}
    - {label: axial bridge, marker: 2, coordination: 2, definition: Between neighbours parallel to the c axis.}
    - {label: row pocket, marker: 3, coordination: 3, definition: In the opening between adjacent zig-zag rows.}
  ase_example: |
    from ase.build import bulk, surface

    mg = bulk("Mg", "hcp", a=3.21, c=5.21)
    slab = surface(mg, (1, 1, 0), 10, vacuum=10)
  common_mistakes:
    - Treating the two prism families as the same cut.
    - Confusing Miller-Bravais (11-20) with a cubic four-index notation.
  figures: {top: /assets/surfaces/hcp-11m20-top.svg, profile: /assets/surfaces/hcp-11m20-profile.svg, stacking: /assets/surfaces/hcp-11m20-stacking.svg}

- id: hcp-10m11
  crystal: hcp
  title: HCP(10-11)
  group: high-index
  family: Pyramidal HCP
  lattice: Hexagonal close packed
  facet: "(10-11)"
  surface_shape: Oblique ridges
  character: Pyramidal · stepped
  ase_builder: surface
  description: The first-order pyramidal face cuts both the basal plane and c axis. Its oblique rows contain atoms at several heights and lack the simple symmetry of basal or prism faces.
  cut_description: Adding a nonzero l index tilts the (10-10) prism plane towards the basal plane. The cut crosses both the side and end of the hexagonal bulk cell.
  card_description: An oblique HCP cut with mixed basal and axial character.
  registry_note: The two-atom HCP basis appears as alternating-height ridges; rotating the model is essential for separating projected neighbours.
  math_summary: 'Both basal and c-axis intercepts are finite, giving a genuinely pyramidal orientation.'
  sites:
    - {label: ridge ontop, marker: 1, coordination: 1, definition: Above an atom on the upper oblique ridge.}
    - {label: ridge bridge, marker: 2, coordination: 2, definition: Between neighbours along that ridge.}
    - {label: lower pocket, marker: 3, coordination: 3, definition: In a mixed-height opening below the ridge.}
  ase_example: |
    from ase.build import bulk, surface

    mg = bulk("Mg", "hcp", a=3.21, c=5.21)
    slab = surface(mg, (1, 0, 1), 10, vacuum=10)
  common_mistakes:
    - Flattening all projected rows into one atomic layer.
    - Omitting the c/a ratio when comparing pyramidal surfaces.
  figures: {top: /assets/surfaces/hcp-10m11-top.svg, profile: /assets/surfaces/hcp-10m11-profile.svg, stacking: /assets/surfaces/hcp-10m11-stacking.svg}

- id: hcp-10m12
  crystal: hcp
  title: HCP(10-12)
  group: high-index
  family: Pyramidal HCP
  lattice: Hexagonal close packed
  facet: "(10-12)"
  surface_shape: Broad oblique terraces
  character: Pyramidal · lower tilt
  ase_builder: surface
  description: HCP(10-12) has a stronger c-axis index than (10-11), changing the inclination and spacing of the exposed ridges. It is a useful visual example of how l controls pyramidal tilt.
  cut_description: Doubling l moves the plane's c-axis intercept closer to the origin. The coloured cut therefore rotates relative to (10-11) while keeping the same basal orientation.
  card_description: A second pyramidal inclination with broader projected terraces.
  registry_note: The terrace width and layer sequence differ from (10-11), even though both share the same basal indices.
  math_summary: 'Comparing (10-11) and (10-12) isolates the effect of increasing the c-axis reciprocal component.'
  sites:
    - {label: terrace ontop, marker: 1, coordination: 1, definition: Above an atom between oblique ridges.}
    - {label: terrace bridge, marker: 2, coordination: 2, definition: Between two atoms on the same projected level.}
    - {label: step pocket, marker: 3, coordination: 3, definition: In the mixed-layer opening at a ridge.}
  ase_example: |
    from ase.build import bulk, surface

    mg = bulk("Mg", "hcp", a=3.21, c=5.21)
    slab = surface(mg, (1, 0, 2), 10, vacuum=10)
  common_mistakes:
    - Assuming the second pyramidal index changes only the cell label.
    - Comparing geometry without holding the c/a ratio fixed.
  figures: {top: /assets/surfaces/hcp-10m12-top.svg, profile: /assets/surfaces/hcp-10m12-profile.svg, stacking: /assets/surfaces/hcp-10m12-stacking.svg}

- id: hcp-11m21
  crystal: hcp
  title: HCP(11-21)
  group: high-index
  family: Pyramidal HCP
  lattice: Hexagonal close packed
  facet: "(11-21)"
  surface_shape: Oblique zig-zag rows
  character: Pyramidal · anisotropic
  ase_builder: surface
  description: HCP(11-21) combines the rotated basal orientation of (11-20) with a finite c-axis intercept. The result is an anisotropic pyramidal face with staggered ledges.
  cut_description: Starting from the (11-20) prism, the l=1 component tilts the plane towards the basal direction. The cut meets a different pair of hexagonal side faces than (10-11).
  card_description: A rotated pyramidal cut with strongly staggered ledges.
  registry_note: Several projected nearest neighbours occupy different heights because both the basal rotation and pyramidal tilt act at once.
  math_summary: 'The four-index constraint \(i=-(h+k)\) gives (11-21); its three-index ASE input is represented here by (1,1,1).'
  sites:
    - {label: ledge ontop, marker: 1, coordination: 1, definition: Above an atom at the upper staggered ledge.}
    - {label: ledge bridge, marker: 2, coordination: 2, definition: Between neighbours following the oblique ledge.}
    - {label: pyramidal pocket, marker: 3, coordination: 3, definition: In the mixed-height opening below the ledge.}
  ase_example: |
    from ase.build import bulk, surface

    mg = bulk("Mg", "hcp", a=3.21, c=5.21)
    slab = surface(mg, (1, 1, 1), 10, vacuum=10)
  common_mistakes:
    - Dropping the basal rotation when comparing it with (10-11).
    - Counting projected atoms without distinguishing their z levels.
  figures: {top: /assets/surfaces/hcp-11m21-top.svg, profile: /assets/surfaces/hcp-11m21-profile.svg, stacking: /assets/surfaces/hcp-11m21-stacking.svg}
