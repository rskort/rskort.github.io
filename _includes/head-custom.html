<!-- MathJax config and loader -->
<script>
window.MathJax = {
  tex: {
    inlineMath: [['\\(', '\\)']],
    displayMath: [['$$', '$$']],
    tags: 'ams',
    packages: {'[+]': ['mhchem']},
    macros: {
      dd: '\\,\\mathrm{d}',
      vb: ['\\left\\langle #1 \\right\\rangle', 1]
    }
  },
  options: { skipHtmlTags: ['script','noscript','style','textarea','pre','code'] }
};
</script>
<script id="MathJax-script" async
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<!-- Minimal styling for chapter navigation -->
<style>
.chapter-nav {
  display: flex;
  justify-content: space-between;
  gap: 1rem;
  margin-top: 2rem;
  padding-top: 1rem;
  border-top: 1px solid #e1e4e8;
  font-weight: 500;
}
.chapter-nav a {
  text-decoration: none;
}
.chapter-nav a:hover {
  text-decoration: underline;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function () {
  var series  = '{{ page.series | escape }}';
  var chapter = '{{ page.chapter }}';
  var title   = '{{ page.title   | escape }}';

  if (series && chapter) {
    // Find the displayed H1 used by common Jekyll themes
    var h1 = document.querySelector('main h1, article h1, .post-title, h1');
    if (h1 && !/Chapter\s+\d+:/.test(h1.textContent)) {
      h1.textContent = 'Chapter ' + chapter + ': ' + title;
    }

    // Keep metadata consistent without changing front matter
    var full = 'Chapter ' + chapter + ': ' + title;
    var siteTitle = '{{ site.title | default: site.name | escape }}';
    if (siteTitle) document.title = full + ' | ' + siteTitle;

    var og = document.querySelector('meta[property="og:title"]');
    if (og) og.setAttribute('content', full);

    var tw = document.querySelector('meta[name="twitter:title"]');
    if (tw) tw.setAttribute('content', full);
  }
});
</script>
