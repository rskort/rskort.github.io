<!-- MathJax config and loader -->
<script>
window.MathJax = {
  tex: {
    inlineMath: [['\\(', '\\)']],
    displayMath: [['$$', '$$']],
    tags: 'ams',
    packages: {'[+]': ['mhchem']},
    macros: {
      dd: '\\,\\mathrm{d}',
      vb: ['\\left\\langle #1 \\right\\rangle', 1]
    }
  },
  options: { skipHtmlTags: ['script','noscript','style','textarea','pre','code'] }
};
</script>
<script id="MathJax-script" async
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<!-- Minimal styling for chapter navigation -->
<style>
.chapter-nav {
  display: flex;
  justify-content: space-between;
  gap: 1rem;
  margin-top: 2rem;
  padding-top: 1rem;
  border-top: 1px solid #e1e4e8;
  font-weight: 500;
}
.chapter-nav a {
  text-decoration: none;
}
.chapter-nav a:hover {
  text-decoration: underline;
}
</style>

<!-- Dynamic chapter heading and metadata update -->
<script>
document.addEventListener('DOMContentLoaded', function () {
  var chapter = '{{ page.chapter | escape }}';
  var title   = '{{ page.title | escape }}';
  var siteTitle = '{{ site.title | default: site.name | escape }}';

  // Only modify if a chapter number exists
  if (chapter && chapter !== '' && title) {
    var fullTitle = 'Chapter ' + chapter + ': ' + title;

    // Find the visible H1 used by Minima or similar themes
    var h1 = document.querySelector('main h1, article h1, .page-title, .post-title, h1');
    if (h1 && !/Chapter\s+\d+:/.test(h1.textContent.trim())) {
      h1.textContent = fullTitle;
    }

    // Update browser tab title
    if (siteTitle) {
      document.title = fullTitle + ' | ' + siteTitle;
    } else {
      document.title = fullTitle;
    }

    // Update Open Graph and Twitter metadata titles
    var og = document.querySelector('meta[property="og:title"]');
    if (og) og.setAttribute('content', fullTitle);

    var tw = document.querySelector('meta[name="twitter:title"]');
    if (tw) tw.setAttribute('content', fullTitle);
  }
});
</script>
