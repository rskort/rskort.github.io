title: "rskort"
url: "https://rskort.github.io"
theme: null
markdown: kramdown
kramdown:
  input: GFM

# Every Markdown file uses the page layout by default
defaults:
  - scope:
      path: ""
    values:
      layout: "page"

collections:
  series:
    output: true

defaults:
  # AFM series pages → /afm-series/…
  - scope:
      type: series
      path: "_series/afm-series"
    values:
      permalink: "/afm-series/:basename/"

  # Add new ones as you go:
  # - scope:
  #     type: series
  #     path: "_series/example-series"
  #   values:
  #     permalink: "/example-series/:basename/"
