title: "R.S. Kort"
description: "Rick Kort’s personal site"
url: "https://rskort.github.io"
baseurl: ""  # important for username.github.io sites

exclude:
  - backup

markdown: kramdown

kramdown:
  input: GFM
  math_engine: mathjax
  parse_block_html: true

collections:
  tutorials:
    output: true
    permalink: /tutorials/:name/
  games:
    output: true
    permalink: /games/:name/

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

author:
  name: "Rick Kort"
  url: "https://rskort.github.io/about.html"

