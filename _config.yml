title: Rick Kort
description: Tutorial and explanations of topics related to electrochemical interfaces, molecular dynamics, AFM, and more.
theme: minima

author: Rick Kort
github_username: rskort

markdown: kramdown
kramdown:
  input: GFM
  math_engine: mathjax

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

permalink: /:categories/:year/:month/:day/:title/

# Collections for chapter style content
collections:
  chapters:
    output: true
    permalink: /:series_slug/:name/

# Defaults so chapters render as pages with no dates
defaults:
  - scope:
      path: ""
      type: chapters
    values:
      layout: page

# Minimal Minima settings
minima:
  social_links:
    - { platform: github, user_url: "https://github.com/rskort" }
  skin: classic
