<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <script>
      window.MathJax = {
        tex: { inlineMath: [['\\(', '\\)']], displayMath: [['\\[', '\\]']] },
        options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] }
      };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  </head>
  <body>
    <header class="site-header">
      <a class="site-name" href="{{ '/' | relative_url }}">Surface Science Notes</a>
      <nav aria-label="Primary navigation">
        <a href="{{ '/surface-sites/' | relative_url }}">Surface atlas</a>
        <a href="{{ '/concepts/miller-indices/' | relative_url }}">Concepts</a>
      </nav>
    </header>
    <main class="page-shell">
      {{ content }}
    </main>
    <footer class="site-footer">A static, open reference for crystal surface geometry.</footer>
    <script src="{{ '/assets/js/surface-viewer-placeholder.js' | relative_url }}" defer></script>
  </body>
</html>
