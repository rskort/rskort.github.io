<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    <meta name="theme-color" content="#f7f8f5">
    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <script>
      window.MathJax = {
        tex: { inlineMath: [['\\(', '\\)']], displayMath: [['\\[', '\\]']] },
        options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] }
      };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  </head>
  <body>
    <header class="site-header">
      <a class="site-name" href="{{ '/' | relative_url }}"><span class="site-mark" aria-hidden="true"></span>Surface Science Notes</a>
      <nav aria-label="Primary navigation">
        <a {% if page.url contains '/surface-sites/' %}aria-current="page"{% endif %} href="{{ '/surface-sites/' | relative_url }}">Surfaces</a>
        <a {% if page.url contains '/concepts/' %}aria-current="page"{% endif %} href="{{ '/concepts/' | relative_url }}">Concepts</a>
      </nav>
    </header>
    <main class="page-shell">
      {{ content }}
    </main>
    <footer class="site-footer">
      <span>Surface Science Notes</span>
      <span>Geometry, sites, and practical models.</span>
    </footer>
    <script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>
  </body>
</html>
