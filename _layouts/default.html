<!doctype html>
<html lang="en">
<head>
  {% include head.html %}
</head>
<body>
  {% include header.html %}

  <main class="site-main">
    <div class="container">
      {{ content }}
    </div>
  </main>

  {% include footer.html %}

  {% include auth.html %}

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
  {% if jekyll.environment != "production" %}
  <script src="/assets/js/local-env.js"></script>
  {% endif %}
  <script>
    (function assignSupabaseKey() {
      const metaKey = document.querySelector('meta[name="supabase-key"]');
      const keyFromMeta = metaKey?.content?.trim();
      const placeholder = 'PASTE_SUPABASE_ANON_KEY_HERE';
      window.SUPABASE_ANON_KEY = keyFromMeta || window.SUPABASE_ANON_KEY || placeholder;
    }());
  </script>
  <script type="module" src="/assets/js/auth.js"></script>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      }
    };
  </script>
  <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</body>
</html>
